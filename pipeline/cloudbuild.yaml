# Cached build: reuse the previous image's layers so only the app/ COPY (and
# anything after it) rebuilds. App-only changes go from ~50 min to a few min.
steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        REG=us-central1-docker.pkg.dev/bakers-agent/heirloom/pipeline
        docker pull $REG:cache || docker pull $REG:v9 || true
        docker build \
          --cache-from $REG:cache --cache-from $REG:v9 \
          -t $REG:${_TAG} -t $REG:cache .
        docker push $REG:${_TAG}
        docker push $REG:cache
timeout: 3600s
options:
  machineType: E2_HIGHCPU_8
substitutions:
  _TAG: latest
